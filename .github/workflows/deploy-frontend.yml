name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  quality:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  build-and-deploy:
    name: Build & Deploy Next.js
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          [ -z "$API_GATEWAY_URL" ]      && echo "❌ API_GATEWAY_URL not set"      && missing=1 || echo "✅ API_GATEWAY_URL"
          [ -z "$COGNITO_USER_POOL_ID" ] && echo "❌ COGNITO_USER_POOL_ID not set" && missing=1 || echo "✅ COGNITO_USER_POOL_ID"
          [ -z "$COGNITO_CLIENT_ID" ]    && echo "❌ COGNITO_CLIENT_ID not set"    && missing=1 || echo "✅ COGNITO_CLIENT_ID"
          [ -z "$AWS_DEPLOY_ROLE_ARN" ]  && echo "❌ AWS_DEPLOY_ROLE_ARN not set"  && missing=1 || echo "✅ AWS_DEPLOY_ROLE_ARN"
          [ -z "$FRONTEND_BUCKET" ]      && echo "❌ FRONTEND_BUCKET not set"      && missing=1 || echo "✅ FRONTEND_BUCKET"
          [ -z "$CF_DISTRIBUTION_ID" ]   && echo "❌ CF_DISTRIBUTION_ID not set"   && missing=1 || echo "✅ CF_DISTRIBUTION_ID"
          exit $missing
        env:
          API_GATEWAY_URL:      ${{ secrets.API_GATEWAY_URL }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID:    ${{ secrets.COGNITO_CLIENT_ID }}
          AWS_DEPLOY_ROLE_ARN:  ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          FRONTEND_BUCKET:      ${{ secrets.FRONTEND_BUCKET }}
          CF_DISTRIBUTION_ID:   ${{ secrets.CF_DISTRIBUTION_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_GATEWAY_URL }}
          NEXT_PUBLIC_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_USER_POOL_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_REGION: ap-southeast-2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --no-cli-pager
          aws s3 sync frontend/out/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --cache-control "no-cache" \
            --exclude "*" \
            --include "*.html" \
            --no-cli-pager

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
