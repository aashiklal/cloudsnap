name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'tests/**']

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install pytest moto[s3,dynamodb] boto3

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: Package & Deploy
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: [upload, search-tags, modify-tags, delete, object-detection, search-by-image]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Package Lambda
        run: |
          cd backend/${{ matrix.function }}
          pip install -r requirements.txt -t ./package --quiet
          cp lambda_function.py ./package/
          cd package && zip -r ../function.zip . -q

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name cloudsnap-${{ matrix.function }}-prod \
            --zip-file fileb://backend/${{ matrix.function }}/function.zip \
            --no-cli-pager
