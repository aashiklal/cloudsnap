name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'tests/**']

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install pytest pytest-cov moto[s3,dynamodb,rekognition] boto3

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=70

  deploy:
    name: Package & Deploy
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: [upload, search-tags, modify-tags, delete, list-images, object-detection, search-by-image]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Package Lambda
        run: |
          cd backend/${{ matrix.function }}
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -t ./package --quiet
          else
            mkdir -p ./package
          fi
          cp lambda_function.py ./package/
          cd package && zip -r ../function.zip . -q

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name cloudsnap-${{ matrix.function }}-prod \
            --zip-file fileb://backend/${{ matrix.function }}/function.zip \
            --no-cli-pager
